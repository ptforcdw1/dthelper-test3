configs:
  - id: service-method-response-time
    config:
      name: "service-method-response-time"
      template: template.json
      parameters:
        degradationMs: 100              # EDIT: Alert if median response time degrades beyond this many ms (5-min observation)
        slowestDegradationMs: 1000      # EDIT: Alert if response time of slowest 10% degrades beyond this many ms (5-min observation)
        sensitivity: "low"              # EDIT: Sensitivity for response time anomaly alerts (low / medium / high)
    type:
      settings:
        schema: builtin:anomaly-detection.services
        scope: "SERVICE-0000000000000000"   # EDIT: Dynatrace SERVICE entity ID (or "environment" for tenant-wide defaults)
