configs:
  - id: service-method-response-time
    config:
      name: "service-method-response-time"
      template: template.json
      parameters:
        degradationMs: 200              # EDIT: Alert if median response time degrades beyond this many ms (5-min observation)
        slowestDegradationMs: 1500      # EDIT: Alert if response time of slowest 10% degrades beyond this many ms (5-min observation)
        sensitivity: "low"              # EDIT: Sensitivity for response time anomaly alerts (low / medium / high)
    type:
      settings:
        schema: builtin:anomaly-detection.services
        scope: "SERVICE-9D69AEB4F46435EC"   # EDIT: Dynatrace SERVICE entity ID (Tomcat/localhost) — change to another service ID or "environment" if needed
